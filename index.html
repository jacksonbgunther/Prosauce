<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ProSauce — Better sauces, upgraded nutrition.</title>
<template id="__bundler_thumbnail">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#F2EBDB"/>
  <g transform="translate(60 60)">
    <rect x="10" y="20" width="60" height="70" rx="6" fill="#C8252C"/>
    <rect x="22" y="6" width="36" height="18" rx="3" fill="#131210"/>
    <rect x="18" y="36" width="44" height="22" rx="2" fill="#F2EBDB"/>
    <text x="40" y="52" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="700" fill="#131210">PS</text>
  </g>
</svg>
</template>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<style>
:root {
  --cream: #F2EBDB;
  --cream-2: #ECE3CD;
  --paper: #F7F1E2;
  --backdrop: #ECEAE5;
  --ink: #131210;
  --ink-2: #2A2823;
  --muted: #6B675D;
  --line: #1F1D18;
  --red: #C8252C;
  --red-deep: #9C1B22;
  --gold: #B8964D;
  --gold-2: #D4B070;
  --green: #2F4A2A;
  --orange: #E78431;
  --sauce-orange: #F1A455;
  --sauce-green: #B5C19E;

  --display: "Bricolage Grotesque", "Helvetica Neue", sans-serif;
  --body: "Geist", "Helvetica Neue", sans-serif;
  --mono: "JetBrains Mono", ui-monospace, monospace;
  --serif: "Instrument Serif", Georgia, serif;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--body);
  color: var(--ink);
  background: var(--cream);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
img { max-width: 100%; display: block; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: 0; background: none; color: inherit; }

.page { overflow-x: hidden; }

/* ----- Marquee ----- */
.marquee {
  background: var(--ink);
  color: var(--cream);
  border-bottom: 1px solid #000;
  overflow: hidden;
  position: relative;
  z-index: 60;
}
.marquee-track {
  display: flex;
  gap: 48px;
  padding: 11px 0;
  white-space: nowrap;
  animation: marqueeMove 50s linear infinite;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.16em;
}
.marquee-item { display: inline-flex; align-items: center; gap: 14px; }
.marquee-dot {
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--red);
}
@keyframes marqueeMove {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* ----- Nav ----- */
.nav {
  position: sticky;
  top: 0;
  z-index: 50;
  background: var(--cream);
  border-bottom: 1px solid rgba(19,18,16,0.12);
  transition: padding .25s ease, background .25s ease;
}
.nav-scrolled { background: rgba(242,235,219,0.94); backdrop-filter: blur(10px); }
.nav-inner {
  max-width: 1440px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 18px 40px;
  gap: 32px;
}
.nav-left, .nav-right {
  display: flex;
  align-items: center;
  gap: 28px;
}
.nav-right { justify-content: flex-end; }
.nav-link {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink);
  position: relative;
  padding: 6px 0;
  transition: opacity .2s ease;
}
.nav-link:hover { opacity: 0.55; }
.nav-link-muted { color: var(--ink-2); }
.wordmark {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-family: var(--display);
  font-weight: 800;
  font-size: 26px;
  letter-spacing: -0.01em;
  color: var(--ink);
}
.wordmark span:last-child::first-letter { color: var(--red); }
.cart-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 9px 16px;
  border: 1px solid var(--ink);
  border-radius: 999px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  transition: background .2s ease, color .2s ease;
}
.cart-btn:hover { background: var(--ink); color: var(--cream); }
.cart-count {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 20px;
  height: 20px;
  padding: 0 6px;
  border-radius: 999px;
  background: var(--red);
  color: var(--cream);
  font-size: 10px;
  letter-spacing: 0;
  font-weight: 700;
}

/* ----- Hero ----- */
.hero {
  background: var(--cream);
  position: relative;
  border-bottom: 1px solid rgba(19,18,16,0.12);
  overflow: hidden;
}
.hero-grid {
  max-width: 1440px;
  margin: 0 auto;
  padding: 56px 40px 80px;
  display: grid;
  grid-template-columns: 1fr 1.05fr;
  gap: 60px;
  align-items: stretch;
  min-height: 720px;
}
.eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--red);
  margin-bottom: 28px;
}
.eyebrow-dash {
  display: inline-block;
  width: 28px;
  height: 1px;
  background: var(--red);
}
.hero-title {
  font-family: var(--display);
  font-weight: 700;
  font-size: clamp(48px, 7vw, 104px);
  line-height: 0.92;
  letter-spacing: -0.035em;
  margin: 0 0 36px;
  color: var(--ink);
}
.hero-title span { display: block; }
.hero-title-italic {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 400;
  letter-spacing: -0.01em;
  color: var(--red);
}
.hero-specs {
  display: flex;
  align-items: stretch;
  gap: 28px;
  padding: 22px 0;
  border-top: 1px solid rgba(19,18,16,0.18);
  border-bottom: 1px solid rgba(19,18,16,0.18);
  margin-bottom: 28px;
  max-width: 520px;
}
.spec { display: flex; flex-direction: column; }
.spec-num {
  font-family: var(--display);
  font-weight: 700;
  font-size: 44px;
  line-height: 1;
  letter-spacing: -0.03em;
  color: var(--ink);
}
.spec-unit { font-size: 0.55em; font-weight: 600; }
.spec-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 8px;
  line-height: 1.4;
}
.spec-divider {
  width: 1px;
  background: rgba(19,18,16,0.15);
  align-self: stretch;
}
.hero-sub {
  font-size: 17px;
  line-height: 1.55;
  max-width: 480px;
  color: var(--ink-2);
  margin: 0 0 36px;
}
.hero-ctas { display: flex; gap: 12px; align-items: center; margin-bottom: 28px; }
.btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 16px 26px;
  border-radius: 999px;
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 600;
  transition: transform .2s ease, background .2s ease, color .2s ease, border-color .2s ease;
  border: 1px solid transparent;
  white-space: nowrap;
}
.btn:hover { transform: translateY(-1px); }
.btn-primary { background: var(--red); color: var(--cream); }
.btn-primary:hover { background: var(--red-deep); }
.btn-ghost { background: transparent; color: var(--ink); border-color: var(--ink); }
.btn-ghost:hover { background: var(--ink); color: var(--cream); }
.btn-dark { background: var(--ink); color: var(--cream); }
.btn-dark:hover { background: var(--red); }
.btn-large { padding: 22px 36px; font-size: 13px; }
.btn-block { width: 100%; justify-content: center; }
.hero-meta {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.16em;
  color: var(--muted);
}
.hero-meta-divider { color: var(--gold); }

/* Hero stage with bottles */
.hero-stage {
  position: relative;
  background: linear-gradient(180deg, var(--paper) 0%, var(--cream-2) 100%);
  border-radius: 6px;
  border: 1px solid rgba(19,18,16,0.08);
  overflow: hidden;
  min-height: 640px;
}
.hero-bigword {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-family: var(--display);
  font-weight: 800;
  font-size: clamp(120px, 18vw, 260px);
  line-height: 0.82;
  letter-spacing: -0.05em;
  color: var(--cream-2);
  pointer-events: none;
  user-select: none;
}
.hero-bigword span:first-child { color: rgba(200,37,44,0.18); }
.hero-bottle {
  position: absolute;
  bottom: -2px;
  filter: drop-shadow(0 30px 40px rgba(19,18,16,0.18));
  transition: transform .6s cubic-bezier(.2,.7,.2,1);
}
.hero-bottle img { height: 100%; width: auto; object-fit: contain; }
.hero-bottle-front {
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  height: 92%;
  width: auto;
  z-index: 3;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}
.hero-bottle-back {
  left: 14%;
  height: 76%;
  width: auto;
  opacity: 0.6;
  transform: rotate(-6deg) translateY(40px);
  filter: grayscale(0.15) drop-shadow(0 20px 30px rgba(19,18,16,0.18));
  z-index: 2;
  display: flex;
  align-items: flex-end;
}
.hero-stage:hover .hero-bottle-front { transform: translateX(-50%) translateY(10px); }
.hero-stage:hover .hero-bottle-back { transform: rotate(-8deg) translateY(30px) translateX(-12px); }

.hero-tag {
  position: absolute;
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--cream);
  border: 1px solid var(--ink);
  border-radius: 999px;
  padding: 10px 18px 10px 12px;
  z-index: 4;
}
.hero-tag-tl { top: 36px; left: 36px; }
.hero-tag-br { bottom: 36px; right: 36px; }
.hero-tag-num {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--ink); color: var(--cream);
  display: inline-flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 10px; font-weight: 700;
}
.hero-tag-text {
  font-family: var(--mono);
  font-size: 10px;
  line-height: 1.25;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.hero-stamp {
  position: absolute;
  top: 28px;
  right: 36px;
  z-index: 4;
  animation: spin 30s linear infinite;
}
.stamp-text {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  fill: var(--ink);
}
.stamp-num {
  font-family: var(--display);
  font-weight: 700;
  font-size: 28px;
  fill: var(--red);
}
.stamp-sub {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 0.2em;
  fill: var(--ink);
}
@keyframes spin { 100% { transform: rotate(360deg); } }

/* ----- Section Heading ----- */
.section-head { margin-bottom: 56px; }
.section-kicker {
  display: inline-flex;
  align-items: center;
  gap: 14px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--red);
  margin-bottom: 24px;
}
.section-num {
  font-weight: 700;
}
.section-line {
  display: inline-block; width: 36px; height: 1px; background: currentColor;
}
.section-title {
  font-family: var(--display);
  font-weight: 700;
  font-size: clamp(40px, 5vw, 68px);
  line-height: 0.96;
  letter-spacing: -0.03em;
  margin: 0;
  max-width: 14ch;
}

/* ----- Lineup ----- */
.lineup {
  background: var(--paper);
  padding: 110px 0 120px;
  border-bottom: 1px solid rgba(19,18,16,0.08);
}
.lineup-inner { max-width: 1440px; margin: 0 auto; padding: 0 40px; }
.lineup-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 32px;
  margin-bottom: 36px;
}
.product {
  background: var(--cream);
  border-radius: 8px;
  border: 1px solid rgba(19,18,16,0.08);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: transform .3s ease, box-shadow .3s ease;
}
.product:hover { transform: translateY(-3px); box-shadow: 0 24px 60px rgba(19,18,16,0.08); }
.product-stage {
  position: relative;
  height: 480px;
  background: linear-gradient(180deg, var(--cream) 0%, color-mix(in oklab, var(--sauce) 35%, var(--cream)) 100%);
  overflow: hidden;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding-top: 24px;
}
.product-stage-bg {
  position: absolute;
  bottom: -120px;
  left: 50%;
  transform: translateX(-50%);
  width: 580px;
  height: 580px;
  border-radius: 50%;
  background: var(--sauce);
  opacity: 0.55;
  filter: blur(2px);
}
.product-stage-letters {
  position: absolute;
  top: 24px;
  left: 28px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.2em;
  color: var(--ink);
  opacity: 0.55;
}
.product-bottle {
  position: relative;
  height: 94%;
  width: auto;
  max-width: 70%;
  object-fit: contain;
  z-index: 2;
  filter: drop-shadow(0 30px 40px rgba(19,18,16,0.2));
  transition: transform .5s cubic-bezier(.2,.7,.2,1);
}
.product-bottle-hover { transform: translateY(-12px) scale(1.03); }
.product-badge {
  position: absolute;
  top: 24px;
  right: 28px;
  background: var(--ink);
  color: var(--cream);
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.2em;
  padding: 7px 11px;
  border-radius: 4px;
  z-index: 3;
}
.product-info {
  padding: 32px 32px 32px;
  display: flex;
  flex-direction: column;
  gap: 22px;
  border-top: 1px solid rgba(19,18,16,0.1);
}
.product-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 16px;
}
.product-eyebrow {
  font-family: var(--serif);
  font-style: italic;
  font-size: 16px;
  color: var(--accent);
  margin-bottom: 6px;
}
.product-name {
  font-family: var(--display);
  font-weight: 700;
  font-size: 30px;
  letter-spacing: -0.02em;
  line-height: 1.05;
  margin: 0;
}
.product-price {
  font-family: var(--mono);
  font-weight: 600;
  font-size: 18px;
  padding-top: 14px;
}
.product-desc {
  font-size: 15px;
  line-height: 1.5;
  color: var(--ink-2);
  margin: 0;
}
.product-specs {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  border: 1px solid rgba(19,18,16,0.18);
  border-radius: 4px;
  overflow: hidden;
}
.pspec {
  padding: 14px 12px;
  text-align: center;
  border-right: 1px solid rgba(19,18,16,0.12);
}
.pspec:last-child { border-right: 0; }
.pspec-num {
  font-family: var(--display);
  font-weight: 700;
  font-size: 22px;
  letter-spacing: -0.02em;
}
.pspec-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.18em;
  color: var(--muted);
  margin-top: 4px;
}
.product-use {
  display: flex;
  justify-content: space-between;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--muted);
  border-bottom: 1px dashed rgba(19,18,16,0.2);
  padding-bottom: 16px;
}
.product-use-items { color: var(--ink); }
.product-cart {
  display: flex;
  align-items: stretch;
  gap: 12px;
}
.qty {
  display: flex;
  align-items: center;
  border: 1px solid var(--ink);
  border-radius: 999px;
  overflow: hidden;
}
.qty button {
  width: 44px;
  height: 48px;
  font-size: 18px;
  font-weight: 600;
  transition: background .15s ease;
}
.qty button:hover { background: var(--ink); color: var(--cream); }
.qty span {
  min-width: 36px;
  text-align: center;
  font-family: var(--mono);
  font-weight: 600;
  font-size: 14px;
}
.qty-sm button { width: 30px; height: 30px; font-size: 14px; }
.qty-sm span { min-width: 24px; font-size: 12px; }
.product-add { flex: 1; justify-content: center; padding: 0 22px; }

.bundle {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  padding: 28px 32px;
  background: var(--ink);
  color: var(--cream);
  border-radius: 8px;
  flex-wrap: wrap;
}
.bundle-eyebrow {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.2em;
  color: var(--gold-2);
  margin-bottom: 8px;
}
.bundle-title {
  font-family: var(--display);
  font-weight: 700;
  font-size: 26px;
  letter-spacing: -0.02em;
  margin-bottom: 4px;
}
.bundle-sub { font-size: 14px; opacity: 0.7; }
.bundle-right { display: flex; align-items: center; gap: 24px; }
.bundle-price {
  font-family: var(--display);
  display: flex;
  align-items: baseline;
  gap: 10px;
}
.bundle-price-old {
  font-size: 16px;
  text-decoration: line-through;
  opacity: 0.5;
}
.bundle-price-new {
  font-size: 28px;
  font-weight: 700;
  color: var(--gold-2);
}
.bundle .btn-dark { background: var(--cream); color: var(--ink); }
.bundle .btn-dark:hover { background: var(--red); color: var(--cream); }

/* ----- Nutrition ----- */
.nutrition {
  background: var(--ink);
  color: var(--cream);
  padding: 120px 0 130px;
}
.nutrition-inner { max-width: 1440px; margin: 0 auto; padding: 0 40px; }
.nutrition .section-kicker { color: var(--gold-2); }
.nutrition .section-title { color: var(--cream); }
.nutrition-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0;
  border-top: 1px solid rgba(242,235,219,0.18);
  border-left: 1px solid rgba(242,235,219,0.18);
}
.fact {
  border-right: 1px solid rgba(242,235,219,0.18);
  border-bottom: 1px solid rgba(242,235,219,0.18);
  padding: 36px 32px;
  position: relative;
  transition: background .25s ease;
}
.fact:hover { background: rgba(242,235,219,0.04); }
.fact-num {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.2em;
  color: var(--gold-2);
  margin-bottom: 24px;
}
.fact-k {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(242,235,219,0.55);
  margin-bottom: 10px;
}
.fact-v {
  font-family: var(--display);
  font-weight: 600;
  font-size: 28px;
  letter-spacing: -0.02em;
  line-height: 1.1;
}
.nutrition-note {
  display: flex;
  justify-content: space-between;
  margin-top: 56px;
  font-family: var(--display);
  font-weight: 700;
  font-size: clamp(56px, 9vw, 140px);
  letter-spacing: -0.04em;
  line-height: 0.9;
  border-top: 1px solid rgba(242,235,219,0.18);
  padding-top: 36px;
}
.nutrition-note span:nth-child(2) { color: var(--red); font-family: var(--serif); font-style: italic; font-weight: 400; }

/* ----- Lifestyle ----- */
.lifestyle {
  background: var(--cream);
  padding: 120px 0 130px;
}
.lifestyle-inner { max-width: 1440px; margin: 0 auto; padding: 0 40px; }
.lifestyle-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  grid-auto-rows: 240px;
  gap: 16px;
}
.tile { position: relative; }
.tile-tall { grid-row: span 2; grid-column: span 2; }
.tile-wide { grid-row: span 1; grid-column: span 3; }
.tile-pos-0 { grid-column: 1 / span 2; grid-row: 1 / span 2; }
.tile-pos-1 { grid-column: 3 / span 4; grid-row: 1; }
.tile-pos-2 { grid-column: 3 / span 2; grid-row: 2; }
.tile-pos-3 { grid-column: 5 / span 2; grid-row: 2 / span 2; }
.tile-pos-4 { grid-column: 1 / span 4; grid-row: 3; }
.tile-pos-5 { display: none; }
.tile-img {
  position: relative;
  width: 100%;
  height: 100%;
  background: var(--backdrop);
  border-radius: 6px;
  overflow: hidden;
  border: 1px solid rgba(19,18,16,0.08);
}
.tile-stripes {
  position: absolute;
  inset: 0;
  background-image: repeating-linear-gradient(
    135deg,
    rgba(19,18,16,0.025) 0,
    rgba(19,18,16,0.025) 12px,
    rgba(19,18,16,0.06) 12px,
    rgba(19,18,16,0.06) 24px
  );
}
.tile-meta-tl, .tile-meta-br {
  position: absolute;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}
.tile-meta-tl { top: 16px; left: 18px; }
.tile-meta-br { bottom: 16px; right: 18px; text-align: right; }
.tile-num {
  background: var(--ink);
  color: var(--cream);
  display: inline-block;
  padding: 4px 8px;
  border-radius: 3px;
  margin-bottom: 8px;
  font-weight: 600;
}
.tile-flavor { color: var(--ink-2); }
.tile-label {
  font-family: var(--display);
  font-weight: 600;
  font-size: 16px;
  letter-spacing: -0.01em;
  text-transform: none;
  color: var(--ink);
}
.tile-tag { color: var(--muted); margin-top: 4px; }

/* ----- Stores ----- */
.stores {
  background: var(--paper);
  padding: 100px 0 110px;
  border-top: 1px solid rgba(19,18,16,0.08);
  border-bottom: 1px solid rgba(19,18,16,0.08);
}
.stores-inner { max-width: 1440px; margin: 0 auto; padding: 0 40px; }
.stores-head { max-width: 720px; margin-bottom: 48px; }
.stores-title {
  font-family: var(--display);
  font-weight: 700;
  font-size: clamp(32px, 4vw, 52px);
  letter-spacing: -0.025em;
  line-height: 1.05;
  margin: 0;
}
.stores-marquee {
  border-top: 1px solid rgba(19,18,16,0.18);
  border-bottom: 1px solid rgba(19,18,16,0.18);
  padding: 28px 0;
  margin-bottom: 40px;
  overflow: hidden;
}
.stores-track {
  display: flex;
  gap: 64px;
  animation: marqueeMove 40s linear infinite;
  white-space: nowrap;
}
.store-name {
  font-family: var(--display);
  font-weight: 700;
  font-size: 32px;
  letter-spacing: -0.02em;
  color: var(--ink);
  opacity: 0.85;
}
.stores-locator {
  display: flex;
  gap: 12px;
  max-width: 480px;
}
.locator-input {
  flex: 1;
  padding: 16px 20px;
  border-radius: 999px;
  border: 1px solid var(--ink);
  background: var(--cream);
  font-family: var(--mono);
  font-size: 13px;
  letter-spacing: 0.1em;
  outline: none;
}
.locator-input::placeholder { color: var(--muted); }

/* ----- CTA ----- */
.cta {
  background: var(--red);
  color: var(--cream);
  padding: 80px 0 100px;
  position: relative;
  overflow: hidden;
}
.cta-inner {
  max-width: 1440px;
  margin: 0 auto;
  padding: 0 40px;
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 40px;
  align-items: center;
  position: relative;
  z-index: 2;
}
.cta-bigword {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--display);
  font-weight: 800;
  font-size: clamp(160px, 22vw, 360px);
  letter-spacing: -0.05em;
  color: rgba(242,235,219,0.07);
  pointer-events: none;
  z-index: 1;
  white-space: nowrap;
}
.cta-content { position: relative; z-index: 3; }
.cta-line {
  font-family: var(--display);
  font-weight: 700;
  font-size: clamp(40px, 5vw, 64px);
  letter-spacing: -0.025em;
  line-height: 1.05;
  margin-bottom: 4px;
}
.cta-line-italic {
  font-family: var(--serif);
  font-style: italic;
  font-weight: 400;
  letter-spacing: -0.01em;
  margin-bottom: 32px;
}
.cta-buttons { display: flex; gap: 12px; }
.cta .btn-primary { background: var(--cream); color: var(--ink); }
.cta .btn-primary:hover { background: var(--ink); color: var(--cream); }
.cta-bottles {
  position: relative;
  display: flex;
  justify-content: center;
  align-items: flex-end;
  gap: -20px;
  height: 420px;
  z-index: 3;
}
.cta-bottles img {
  height: 100%;
  width: auto;
  object-fit: contain;
  filter: drop-shadow(0 24px 30px rgba(0,0,0,0.25));
}
.cta-bottles img:nth-child(1) {
  transform: rotate(-6deg) translateY(10px);
  margin-right: -40px;
  z-index: 2;
}
.cta-bottles img:nth-child(2) {
  transform: rotate(6deg) translateY(10px);
  z-index: 1;
  height: 88%;
}

/* ----- Footer ----- */
.foot {
  background: var(--ink);
  color: var(--cream);
  padding: 80px 0 36px;
}
.foot-top {
  max-width: 1440px;
  margin: 0 auto;
  padding: 0 40px;
  display: grid;
  grid-template-columns: 1.2fr 2fr;
  gap: 48px;
  padding-bottom: 64px;
  border-bottom: 1px solid rgba(242,235,219,0.18);
}
.foot-brand { display: flex; flex-direction: column; gap: 12px; }
.foot-wordmark {
  font-family: var(--display);
  font-weight: 800;
  font-size: 44px;
  letter-spacing: -0.02em;
}
.foot-tag {
  font-family: var(--serif);
  font-style: italic;
  font-size: 18px;
  color: rgba(242,235,219,0.7);
  max-width: 22ch;
}
.foot-cols {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 32px;
}
.foot-col { display: flex; flex-direction: column; gap: 8px; }
.foot-col-h {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.2em;
  color: var(--gold-2);
  text-transform: uppercase;
  margin-bottom: 12px;
}
.foot-col a {
  font-size: 14px;
  color: rgba(242,235,219,0.75);
  cursor: pointer;
  transition: color .2s ease;
}
.foot-col a:hover { color: var(--cream); }
.foot-bottom {
  max-width: 1440px;
  margin: 0 auto;
  padding: 28px 40px 0;
  display: flex;
  justify-content: space-between;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.16em;
  color: rgba(242,235,219,0.5);
}
.foot-legal { display: flex; gap: 24px; }

/* ----- Drawer ----- */
.drawer-scrim {
  position: fixed;
  inset: 0;
  background: rgba(19,18,16,0.5);
  z-index: 80;
  opacity: 0;
  pointer-events: none;
  transition: opacity .3s ease;
}
.drawer-scrim-open { opacity: 1; pointer-events: auto; }
.drawer {
  position: fixed;
  top: 0;
  right: 0;
  height: 100vh;
  width: 440px;
  max-width: 92vw;
  background: var(--cream);
  z-index: 90;
  transform: translateX(100%);
  transition: transform .35s cubic-bezier(.2,.7,.2,1);
  display: flex;
  flex-direction: column;
  border-left: 1px solid var(--ink);
}
.drawer-open { transform: translateX(0); }
.drawer-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 24px 28px;
  border-bottom: 1px solid rgba(19,18,16,0.15);
}
.drawer-title {
  font-family: var(--display);
  font-weight: 700;
  font-size: 24px;
  letter-spacing: -0.02em;
}
.drawer-close {
  font-size: 28px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.drawer-close:hover { background: var(--ink); color: var(--cream); }
.drawer-body {
  flex: 1;
  overflow-y: auto;
  padding: 24px 28px;
}
.drawer-empty {
  text-align: center;
  padding: 40px 0;
  color: var(--muted);
}
.drawer-empty-mark { display: flex; justify-content: center; margin-bottom: 20px; opacity: 0.4; }
.drawer-empty-title {
  font-family: var(--display);
  font-weight: 600;
  font-size: 22px;
  color: var(--ink);
  margin-bottom: 6px;
}
.drawer-empty-sub { font-size: 14px; }
.drawer-item {
  display: grid;
  grid-template-columns: 80px 1fr;
  gap: 16px;
  padding: 16px 0;
  border-bottom: 1px solid rgba(19,18,16,0.1);
}
.drawer-item-img {
  height: 100px;
  border-radius: 4px;
  display: flex;
  justify-content: center;
  align-items: flex-end;
  overflow: hidden;
}
.drawer-item-img img { height: 95%; width: auto; object-fit: contain; }
.drawer-item-info { display: flex; flex-direction: column; gap: 8px; }
.drawer-item-name {
  font-family: var(--display);
  font-weight: 600;
  font-size: 15px;
  letter-spacing: -0.01em;
}
.drawer-item-price {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
}
.drawer-foot {
  border-top: 1px solid rgba(19,18,16,0.15);
  padding: 24px 28px;
  background: var(--paper);
}
.drawer-totals {
  display: flex;
  justify-content: space-between;
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.drawer-total-num {
  font-family: var(--display);
  font-weight: 700;
  font-size: 18px;
  letter-spacing: -0.01em;
}
.drawer-shipping {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  color: var(--muted);
  margin-bottom: 16px;
}

/* ----- Toast ----- */
.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--ink);
  color: var(--cream);
  padding: 14px 22px;
  border-radius: 999px;
  z-index: 100;
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 12px;
  animation: toastIn .3s ease;
  box-shadow: 0 12px 30px rgba(0,0,0,0.2);
}
.toast-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--red);
}
@keyframes toastIn {
  from { transform: translate(-50%, 20px); opacity: 0; }
  to { transform: translate(-50%, 0); opacity: 1; }
}

/* ----- Responsive ----- */
@media (max-width: 980px) {
  .nav-inner { grid-template-columns: auto 1fr auto; }
  .nav-left { display: none; }
  .hero-grid { grid-template-columns: 1fr; gap: 32px; padding: 32px 24px 48px; }
  .hero-stage { min-height: 480px; }
  .lineup-grid { grid-template-columns: 1fr; }
  .nutrition-grid { grid-template-columns: 1fr 1fr; }
  .lifestyle-grid { grid-template-columns: repeat(4, 1fr); grid-auto-rows: 200px; }
  .tile-pos-0 { grid-column: 1 / span 2; grid-row: 1 / span 2; }
  .tile-pos-1 { grid-column: 3 / span 2; grid-row: 1; }
  .tile-pos-2 { grid-column: 3 / span 2; grid-row: 2; }
  .tile-pos-3 { grid-column: 1 / span 2; grid-row: 3 / span 2; }
  .tile-pos-4 { grid-column: 3 / span 2; grid-row: 3 / span 2; }
  .cta-inner { grid-template-columns: 1fr; }
  .cta-bottles { height: 320px; }
  .foot-top { grid-template-columns: 1fr; }
  .foot-cols { grid-template-columns: repeat(3, 1fr); }
  .nutrition-inner, .lineup-inner, .lifestyle-inner, .stores-inner, .cta-inner {
    padding-left: 24px; padding-right: 24px;
  }
}
@media (max-width: 600px) {
  .nutrition-grid { grid-template-columns: 1fr; }
  .lifestyle-grid { grid-template-columns: 1fr 1fr; grid-auto-rows: 180px; }
  .tile-pos-0, .tile-pos-1, .tile-pos-2, .tile-pos-3, .tile-pos-4 {
    grid-column: span 2; grid-row: auto;
  }
  .foot-cols { grid-template-columns: 1fr; }
  .hero-tag-tl, .hero-tag-br, .hero-stamp { display: none; }
  .product-cart { flex-direction: column; }
  .qty { align-self: flex-start; }
  .product-add { width: 100%; }
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="prosauce-landing.jsx"></script>
